<!DOCTYPE html>
<html lang="ru">
<head>
    <title>ПАРИЖ | Салон красоты</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #111; }
        body { font-family: 'Montserrat', sans-serif; margin: 0; padding-bottom: 100px; }
        header { position: fixed; top: 0; width: 100%; background: rgba(255,255,255,0.9); padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; z-index: 100; border-bottom: 1px solid #eee; }
        .hero { height: 60vh; background: linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.4)), url('https://api20.iloveimg.com/v1/download/dnl6b2x2jq4ls613xz0szn24shjndczp87A5y7fmx97h5sdk9c49llnljksd9v6xtAq2s2k4gk9crrgs7tvhg3sdnmkw9Apfg9f27f5k6Ap1kzbAAcn5smxh2qz6c3hk3mbph3cAA6flkctm467A1xc6sbd7ncsgf8sv8kvn6qhnmtqbg6w1') center/cover; display: flex; align-items: center; justify-content: center; color: #fff; text-align: center; margin-top: 50px; }
        .btn-main { padding: 15px 30px; background: var(--dark); color: #fff; border: none; cursor: pointer; font-weight: 700; text-transform: uppercase; }
        .section { padding: 40px 10%; text-align: center; }
        #booking-app { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 1000; overflow-y: auto; padding-top: 60px; }
        .s-card { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #f9f9f9; margin-bottom: 10px; border-radius: 8px; }
        .y-input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; }
        #cart-bar { position: fixed; bottom: 0; width: 100%; background: #000; color: #fff; padding: 20px; display: none; justify-content: space-between; align-items: center; z-index: 1001; }
    </style>
</head>
<body>

<header>
    <div style="font-weight:900;">ПАРИЖ</div>
    <div style="font-size: 12px;">ТРЦ АРЕНА (1 ЭТАЖ)</div>
</header>

<div class="hero">
    <div>
        <h1 style="font-size: 40px; margin-bottom: 20px;">Здесь стригут клёво</h1>
        <button class="btn-main" onclick="openBooking()">Записаться</button>
    </div>
</div>

<section class="section">
    <h2>МЫ НА КАРТЕ</h2>
    <div style="width:100%; height:300px; border-radius:15px; overflow:hidden;">
        <script type="text/javascript" charset="utf-8" async src="https://api-maps.yandex.ru/services/constructor/1.0/js/?um=constructor%3A2a795ee99572c857cbb2ed1e8182ff7783dda036340148f4dfbf42c5e1518596&amp;width=100%25&amp;height=300&amp;lang=ru_RU&amp;scroll=true"></script>
    </div>
</section>

<div id="booking-app">
    <div class="section">
        <button onclick="location.reload()" style="float:left; border:none; background:none; font-size:24px;">✕</button>
        <h2 id="step-title">ВЫБЕРИТЕ УСЛУГИ</h2>
        
        <div id="step-services">
            <div id="services-container"></div>
        </div>

        <div id="step-form" style="display:none; max-width: 400px; margin: 0 auto; text-align: left;">
            <label>Дата:</label>
            <input type="date" id="uDate" class="y-input" onchange="checkAvailability()">
            <label>Время:</label>
            <select id="uTime" class="y-input" onchange="checkAvailability()">
                <option value="9">09:00</option><option value="10">10:00</option><option value="11">11:00</option><option value="12">12:00</option>
                <option value="13">13:00</option><option value="14">14:00</option><option value="15">15:00</option><option value="16">16:00</option>
                <option value="17">17:00</option><option value="18">18:00</option><option value="19">19:00</option><option value="20">20:00</option>
            </select>
            <input type="text" id="uName" placeholder="Ваше имя" class="y-input">
            <input type="tel" id="uPhone" placeholder="Телефон" class="y-input">
            <button id="finalBtn" class="btn-main" style="width:100%;" onclick="finishBooking()">ПОДТВЕРДИТЬ</button>
        </div>
    </div>
</div>

<div id="cart-bar">
    <div id="cart-info">Выбрано услуг: 0</div>
    <button onclick="goToForm()" style="background:var(--gold); border:none; padding:10px 20px; color:#fff; font-weight:700;">ДАЛЕЕ</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDE-ZzO_39S-TshO8u36M7_W_E9qM",
        projectId: "parisarenaonline",
        appId: "1:84149021703:web:a2b75e7a9b6c4d5e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let cart = [];

    window.openBooking = async () => {
        document.getElementById('booking-app').style.display = 'block';
        const snap = await getDocs(collection(db, "services"));
        const container = document.getElementById('services-container');
        container.innerHTML = "";
        snap.forEach(d => {
            const s = d.data();
            const div = document.createElement('div');
            div.className = 's-card';
            div.innerHTML = `<span>${s.name}</span><button onclick="window.addS('${s.name}')" style="padding:5px 15px;">+</button>`;
            container.appendChild(div);
        });
    };

    window.addS = (name) => {
        const item = cart.find(i => i.name === name);
        if (item) item.quantity++; else cart.push({name, quantity: 1});
        document.getElementById('cart-bar').style.display = 'flex';
        document.getElementById('cart-info').innerText = "Выбрано: " + cart.length;
    };

    window.goToForm = () => {
        document.getElementById('step-services').style.display = 'none';
        document.getElementById('step-form').style.display = 'block';
        document.getElementById('step-title').innerText = "ДАННЫЕ ЗАПИСИ";
    };

    window.checkAvailability = async () => {
        const d = document.getElementById('uDate').value;
        const t = document.getElementById('uTime').value;
        if (!d) return;
        const p = d.split('-');
        const id = `${p[0]}_${parseInt(p[1])}_${parseInt(p[2])}_${t}`;
        const btn = document.getElementById('finalBtn');
        
        btn.disabled = true;
        btn.innerText = "ПРОВЕРКА...";
        
        const snap = await getDoc(doc(db, "appointments", id));
        if (snap.exists()) {
            btn.innerText = "ЗАНЯТО";
            btn.style.background = "red";
        } else {
            btn.innerText = "ПОДТВЕРДИТЬ";
            btn.style.background = "#111";
            btn.disabled = false;
        }
    };

    window.finishBooking = async () => {
        const d = document.getElementById('uDate').value;
        const n = document.getElementById('uName').value;
        const p = document.getElementById('uPhone').value;
        if(!d || !n || !p) return alert("Заполните поля!");

        const parts = d.split('-');
        const t = document.getElementById('uTime').value;
        const id = `${parts[0]}_${parseInt(parts[1])}_${parseInt(parts[2])}_${t}`;

        try {
            await setDoc(doc(db, "appointments", id), {
                name: n,
                phone: p,
                services: cart,
                date: `${parseInt(parts[2])}.${parseInt(parts[1])}.${parts[0]}`,
                hour: parseInt(t)
            });
            alert("ЗАПИСЬ УСПЕШНА!");
            location.reload();
        } catch (e) {
            alert("Ошибка Firebase: " + e.message);
        }
    };
</script>
</body>
</html>
