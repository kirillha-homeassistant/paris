<!DOCTYPE html>
<html lang="ru">
<head>
    <title>ПАРИЖ | Салон красоты</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #1a1a1a; --light: #ffffff; --border: #e0e0e0; }
        * { box-sizing: border-box; outline: none; }
        body { font-family: 'Montserrat', sans-serif; margin: 0; background: var(--light); color: var(--dark); line-height: 1.6; overflow-x: hidden; }
        
        header { 
            position: fixed; top: 0; width: 100%; z-index: 1000; 
            padding: 10px 5%; display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);
        }

        /* КОМПАКТНЫЙ HERO (ДЛЯ ТЕЛЕФОНОВ) */
        .hero { 
            height: 60vh; /* Уменьшили высоту, чтобы влезало */
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.2)), 
            url('https://api20.iloveimg.com/v1/download/dnl6b2x2jq4ls613xz0szn24shjndczp87A5y7fmx97h5sdk9c49llnljksd9v6xtAq2s2k4gk9crrgs7tvhg3sdnmkw9Apfg9f27f5k6Ap1kzbAAcn5smxh2qz6c3hk3mbph3cAA6flkctm467A1xc6sbd7ncsgf8sv8kvn6qhnmtqbg6w1') center/cover; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; text-align: center;
            margin-top: 60px; /* Отступ под шапку */
            padding: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(5px);
            padding: 30px; border: 1px solid rgba(255,255,255,0.2); border-radius: 15px;
            max-width: 90%; /* Чтобы не вылезало по бокам */
        }

        .btn-main { 
            margin-top: 15px; padding: 15px 35px; background: #fff; color: #000; 
            font-weight: 800; border: none; cursor: pointer; transition: 0.3s; text-transform: uppercase; font-size: 14px;
        }
        .btn-main:disabled { background: #ff4444 !important; color: #fff; cursor: not-allowed; }

        .section { padding: 40px 10%; text-align: center; }
        .map-container { width: 100%; height: 300px; border-radius: 15px; overflow: hidden; margin-top: 15px; border: 1px solid #eee; }

        /* ОКНО ЗАПИСИ (APP) */
        #booking-app { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 2000; overflow-y: auto; padding: 70px 5% 40px 5%; }
        
        .s-card { display: flex; justify-content: space-between; align-items: center; padding: 15px; margin-bottom: 10px; background: #f8f8f8; border-radius: 10px; font-size: 14px; }
        .qty-controls { display: flex; align-items: center; gap: 10px; }
        .qty-btn { width: 30px; height: 30px; border: 1px solid #000; background: #fff; border-radius: 50%; cursor: pointer; font-weight: 700; font-size: 16px; }
        
        #cart-bar { position: fixed; bottom: 0; width: 100%; background: #000; color: #fff; padding: 15px 10%; display: none; justify-content: space-between; align-items: center; z-index: 2001; }
        
        /* СТИЛИ ДЛЯ ФОРМЫ */
        .form-group { text-align: left; margin-bottom: 15px; max-width: 500px; margin-left: auto; margin-right: auto; }
        .form-label { font-size: 12px; font-weight: 700; text-transform: uppercase; color: #666; display: block; margin-bottom: 5px; }
        .y-input { width: 100%; padding: 12px; border: 1px solid #ddd; font-family: inherit; font-size: 16px; border-radius: 8px; background: #fff; }
    </style>
</head>
<body>

    <header>
        <div style="font-weight:900; letter-spacing: 1px;">ПАРИЖ</div>
        <div style="font-size: 10px; font-weight: 700;">АРЕНА | 1 ЭТАЖ</div>
    </header>

    <div class="hero">
        <div class="glass-card">
            <h1 style="font-size: clamp(24px, 4vw, 40px); margin: 0;">Здесь стригут клёво</h1>
            <p style="letter-spacing: 2px; font-weight: 300; margin-top: 5px; font-size: 14px;">САЛОН КРАСОТЫ</p>
            <button class="btn-main" onclick="window.openBooking()">Записаться</button>
        </div>
    </div>

    <section class="section">
        <div style="font-size: 20px; font-weight: 700; margin-bottom: 10px;">МЫ НА КАРТЕ</div>
        <div class="map-container">
            <script type="text/javascript" charset="utf-8" async src="https://api-maps.yandex.ru/services/constructor/1.0/js/?um=constructor%3A2a795ee99572c857cbb2ed1e8182ff7783dda036340148f4dfbf42c5e1518596&amp;width=100%25&amp;height=300&amp;lang=ru_RU&amp;scroll=true"></script>
        </div>
    </section>

    <div id="booking-app">
        <button onclick="location.reload()" style="position:fixed; top:15px; right:15px; font-size:24px; border:none; background:none; cursor:pointer;">✕</button>
        <h2 id="step-title" style="text-align:center; font-size: 18px; text-transform: uppercase;">ВЫБОР УСЛУГ</h2>
        
        <div id="step-services">
            <div id="services-container"></div>
        </div>

        <div id="step-form" style="display:none;">
            
            <div class="form-group">
                <label class="form-label">Дата визита:</label>
                <input type="date" id="uDate" class="y-input" onchange="window.checkAvailability()">
            </div>
            
            <div class="form-group">
                <label class="form-label">Время:</label>
                <select id="uTime" class="y-input" onchange="window.checkAvailability()">
                    <option value="9">09:00</option><option value="10">10:00</option><option value="11">11:00</option><option value="12">12:00</option>
                    <option value="13">13:00</option><option value="14">14:00</option><option value="15">15:00</option><option value="16">16:00</option>
                    <option value="17">17:00</option><option value="18">18:00</option><option value="19">19:00</option><option value="20">20:00</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Выберите мастера:</label>
                <select id="uMaster" class="y-input">
                    <option value="Любой мастер">Любой мастер (ближайшее время)</option>
                    <option value="Елена (Топ-мастер)">Елена (Топ-мастер)</option>
                    <option value="Алексей (Стилист)">Алексей (Стилист)</option>
                    <option value="Ольга (Маникюр)">Ольга (Маникюр)</option>
                </select>
            </div>
            
            <div class="form-group">
                <input type="text" id="uName" placeholder="Ваше имя" class="y-input">
            </div>
            
            <div class="form-group">
                <input type="tel" id="uPhone" placeholder="Телефон" class="y-input">
            </div>
            
            <div class="form-group">
                <textarea id="uComment" placeholder="Комментарий к записи (необязательно)" class="y-input" style="height: 80px; resize: none;"></textarea>
            </div>
            
            <button id="finalBtn" class="btn-main" style="width:100%; max-width: 500px; display: block; margin: 20px auto; background:#000; color:#fff;" onclick="window.finish()">ПОДТВЕРДИТЬ</button>
        </div>
    </div>

    <div id="cart-bar">
        <div id="cart-info" style="font-size: 14px;">Выбрано услуг: 0</div>
        <button style="background:var(--gold); color:#fff; border:none; padding:10px 20px; font-weight:700; cursor:pointer; border-radius:8px; font-size: 12px;" onclick="window.goToForm()">ДАЛЕЕ</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDE-ZzO_39S-TshO8u36M7_W_E9qM",
            projectId: "parisarenaonline",
            appId: "1:84149021703:web:a2b75e7a9b6c4d5e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let cart = [];

        window.openBooking = async () => {
            document.getElementById('booking-app').style.display = 'block';
            document.body.style.overflow = 'hidden'; // Запретить прокрутку фона
            const snap = await getDocs(collection(db, "services"));
            const container = document.getElementById('services-container');
            container.innerHTML = "";
            snap.forEach(d => {
                const s = d.data();
                container.innerHTML += `
                    <div class="s-card">
                        <b>${s.name}</b>
                        <div class="qty-controls">
                            <button class="qty-btn" onclick="window.updateQty('${s.name}', -1)">-</button>
                            <span id="q-${s.name}">0</span>
                            <button class="qty-btn" onclick="window.updateQty('${s.name}', 1)">+</button>
                        </div>
                    </div>`;
            });
        };

        window.updateQty = (name, delta) => {
            let item = cart.find(i => i.name === name);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) cart = cart.filter(i => i.name !== name);
            } else if (delta > 0) {
                cart.push({ name, quantity: 1 });
            }
            const currentItem = cart.find(i => i.name === name);
            if(document.getElementById(`q-${name}`)) {
                document.getElementById(`q-${name}`).innerText = currentItem ? currentItem.quantity : 0;
            }
            const total = cart.reduce((sum, i) => sum + i.quantity, 0);
            document.getElementById('cart-bar').style.display = total > 0 ? 'flex' : 'none';
            document.getElementById('cart-info').innerText = "Всего услуг: " + total;
        };

        window.goToForm = () => {
            document.getElementById('step-services').style.display='none';
            document.getElementById('step-form').style.display='block';
            document.getElementById('step-title').innerText = "ДАННЫЕ ЗАПИСИ";
            document.getElementById('cart-bar').style.display = 'none';
        };

        window.checkAvailability = async () => {
            const dateInput = document.getElementById('uDate').value;
            const timeInput = document.getElementById('uTime').value;
            const btn = document.getElementById('finalBtn');
            if (!dateInput) return;

            const p = dateInput.split('-');
            const id = `${p[0]}_${parseInt(p[1])}_${parseInt(p[2])}_${timeInput}`;
            
            btn.disabled = true;
            btn.innerText = "ПРОВЕРКА...";

            try {
                const snap = await getDoc(doc(db, "appointments", id));
                if (snap.exists()) {
                    btn.innerText = "ВРЕМЯ ЗАНЯТО";
                    btn.style.background = "#ff4444";
                } else {
                    btn.innerText = "ПОДТВЕРДИТЬ";
                    btn.style.background = "#000";
                    btn.disabled = false;
                }
            } catch (e) {
                console.error(e);
                btn.innerText = "ОШИБКА СЕТИ";
                btn.disabled = false;
            }
        };

        window.finish = async () => {
            const dInput = document.getElementById('uDate').value;
            const name = document.getElementById('uName').value;
            const phone = document.getElementById('uPhone').value;
            const master = document.getElementById('uMaster').value; // ПОЛУЧАЕМ МАСТЕРА
            const comment = document.getElementById('uComment').value;

            if(!dInput || !name || !phone) return alert("Заполните дату, имя и телефон!");

            const p = dInput.split('-');
            const t = document.getElementById('uTime').value;
            const id = `${p[0]}_${parseInt(p[1])}_${parseInt(p[2])}_${t}`;

            try {
                const checkAgain = await getDoc(doc(db, "appointments", id));
                if(checkAgain.exists()) return alert("Это время уже заняли!");

                await setDoc(doc(db, "appointments", id), {
                    name, phone, master, comment, services: cart,
                    date: `${parseInt(p[2])}.${parseInt(p[1])}.${p[0]}`,
                    hour: parseInt(t),
                    timestamp: new Date()
                });
                alert("ВЫ УСПЕШНО ЗАПИСАНЫ!");
                location.reload();
            } catch (e) { alert("Ошибка при сохранении: " + e.message); }
        };
    </script>
</body>
</html>
