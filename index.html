<!DOCTYPE html>
<html lang="ru">
<head>
    <title>ПАРИЖ | ТРЦ Арена</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        :root { 
            --y-blue: #000; --y-bg: #ffffff; --y-grey: #8e8e93; --y-light: #f2f2f7; --y-border: #e5e5ea; 
            --y-orange: #f39c12;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background: #fff; color: #000; overflow-x: hidden; }
        
        /* ГЛАВНАЯ СТРАНИЦА */
        .hero { 
            height: 60vh; 
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://api4.iloveimg.com/v1/download/cmym6n02l5c7plfjvdg1df0ytj8hw8bqA9cpxx650wc837ngvnlv52874y5AAAhb8ccswbmy4zh7l1smq8dvyyjd8At4nnx1rx5zjf3801h67dq5qpn7ll5rv9f1qj2txfbp9f8p9wpk3l79l29p06p9kp6rhvwkd7mtk2fnfqxrn9cwbslq'); 
            background-size: cover; background-position: center; color: #fff; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px;
        }
        .hero h1 { font-size: 38px; font-weight: 900; margin: 0; line-height: 1.1; }
        .hero-brand { font-size: 16px; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; margin-top: 20px; }
        .btn-start { background: #fff; color: #000; padding: 18px 40px; border-radius: 12px; font-weight: 800; border: none; cursor: pointer; margin-top: 30px; font-size: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        /* ОТЗЫВЫ */
        .aggregator-section { padding: 40px 0; background: #fafafa; }
        .section-title { font-size: 24px; font-weight: 800; margin: 0 0 20px 20px; text-transform: uppercase; }
        .reviews-slider { display: flex; overflow-x: auto; padding: 10px 20px; gap: 15px; scrollbar-width: none; }
        .review-card { flex: 0 0 280px; background: #fff; border: 1px solid var(--y-border); padding: 20px; border-radius: 20px; }
        .rev-user { display: flex; align-items: center; margin-bottom: 12px; }
        .rev-avatar { width: 35px; height: 35px; border-radius: 50%; background: #000; color: #fff; margin-right: 10px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; }
        
        /* КАРТА */
        .map-wrapper { padding: 40px 0; text-align: center; }

        /* ОКНО ЗАПИСИ */
        #booking-app { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 2000; overflow-y: auto; }
        .header { padding: 15px; border-bottom: 1px solid var(--y-border); display: flex; align-items: center; position: sticky; top: 0; background: #fff; z-index: 10; justify-content: space-between; }
        .back-btn { font-size: 28px; background: none; border: none; cursor: pointer; }
        
        /* КАРТОЧКИ УСЛУГ */
        .s-card { margin: 10px; border: 1px solid var(--y-border); border-radius: 12px; padding: 15px; display: flex; align-items: center; justify-content: space-between; }
        .qty-controls { display: flex; align-items: center; gap: 12px; }
        .qty-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #000; background: #fff; color: #000; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .qty-btn:active { background: #000; color: #fff; }

        /* ФОРМА И КОРЗИНА */
        .form-box { padding: 25px; max-width: 500px; margin: 0 auto; }
        .y-input { width: 100%; padding: 16px; border: 1px solid var(--y-border); border-radius: 12px; margin-bottom: 12px; box-sizing: border-box; font-size: 16px; outline: none; }
        .btn-confirm { width: 100%; background: #000; color: #fff; padding: 18px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }
        
        /* ИКОНКА КОРЗИНЫ */
        #cart-icon-container { position: relative; padding-right: 5px; }
        #cart-count { position: absolute; top: -8px; right: -8px; background: var(--y-orange); color: black; font-size: 11px; font-weight: bold; width: 18px; height: 18px; border-radius: 50%; display: none; align-items: center; justify-content: center; }

        #cart-summary-block { padding: 15px; border-top: 2px solid var(--y-orange); background: #fff; position: sticky; bottom: 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); display: none; }
    </style>
</head>
<body>

    <div id="landing">
        <div class="hero">
            <h1>“Здесь стригут клёво”</h1>
            <div class="hero-brand">ПАРИЖ | ТРЦ АРЕНА</div>
            <button class="btn-start" onclick="openBooking()">ЗАПИСАТЬСЯ</button>
        </div>

        <div class="aggregator-section">
            <div class="section-title">Отзывы клиентов</div>
            <div class="reviews-slider">
                <div class="review-card">
                    <div class="rev-user"><div class="rev-avatar">К</div><b>Кристина</b></div>
                    <p>"Наращивание волос — супер! Елена мастер своего дела."</p>
                </div>
                <div class="review-card">
                    <div class="rev-user"><div class="rev-avatar">Д</div><b>Дмитрий</b></div>
                    <p>"Отличная мужская стрижка. В Арене хожу только сюда."</p>
                </div>
            </div>
        </div>

        <div class="map-wrapper">
            <h3>ТРЦ Арена, 1 этаж</h3>
            <div id="map" style="width:100%; height:300px;">
                <script type="text/javascript" charset="utf-8" async src="https://api-maps.yandex.ru/services/constructor/1.0/js/?um=constructor%3A2a795ee99572c857cbb2ed1e8182ff7783dda036340148f4dfbf42c5e1518596&amp;width=100%25&amp;height=300&amp;lang=ru_RU&amp;scroll=true"></script>
            </div>
        </div>
    </div>

    <div id="booking-app">
        <div class="header">
            <button class="back-btn" onclick="closeBooking()">←</button>
            <b id="step-title">Выбор услуг</b>
            <div id="cart-icon-container">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                <div id="cart-count">0</div>
            </div>
        </div>
        
        <div id="step-services">
            <div id="services-container" style="padding-bottom: 120px;">
                <p style="text-align:center; padding:20px;">Загрузка прайса...</p>
            </div>
            
            <div id="cart-summary-block">
                <div style="font-size: 13px; color: #888;">ВЫБРАНО УСЛУГ:</div>
                <div id="cart-items" style="font-weight: bold; margin: 5px 0 15px 0; font-size: 14px;"></div>
                <button class="btn-confirm" onclick="goToForm()">ПРОДОЛЖИТЬ</button>
            </div>
        </div>

        <div id="step-form" style="display:none;" class="form-box">
            <label style="font-size: 12px; color: #888;">ДАТА И ВРЕМЯ</label>
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <input type="date" id="uDate" class="y-input" style="flex: 2; margin:0;">
                <select id="uTime" class="y-input" style="flex: 1; margin:0;">
                    <option value="9">09:00</option><option value="10">10:00</option><option value="11">11:00</option><option value="12">12:00</option><option value="13">13:00</option><option value="14">14:00</option><option value="15">15:00</option><option value="16">16:00</option><option value="17">17:00</option><option value="18">18:00</option><option value="19">19:00</option><option value="20">20:00</option>
                </select>
            </div>
            <input type="text" id="uName" class="y-input" placeholder="Ваше имя">
            <input type="tel" id="uPhone" class="y-input" placeholder="+7 (___) ___-__-__">
            <textarea id="uComment" class="y-input" style="height: 80px;" placeholder="Комментарий"></textarea>
            <button class="btn-confirm" id="finalBtn" onclick="finish()">ЗАПИСАТЬСЯ</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDE-ZzO_39S-TshO8u36M7_W_E9qM",
            appId: "1:84149021703:web:a2b75e7a9b6c4d5e",
            messagingSenderId: "84149021703",
            projectId: "parisarenaonline",
            storageBucket: "parisarenaonline.appspot.com",
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let cart = [];

        async function loadServices() {
            const container = document.getElementById('services-container');
            const snap = await getDocs(collection(db, "services"));
            container.innerHTML = "";
            snap.forEach(doc => {
                const s = doc.data();
                const card = document.createElement('div');
                card.className = 's-card';
                card.innerHTML = `
                    <div><div class="s-name">${s.name}</div><div class="s-price">${s.price}</div></div>
                    <div class="qty-controls">
                        <div class="qty-btn" onclick="modifyQty('${s.name}', -1)">-</div>
                        <div class="qty-val" id="qty-${s.name}">0</div>
                        <div class="qty-btn" onclick="modifyQty('${s.name}', 1)">+</div>
                    </div>
                `;
                container.appendChild(card);
            });
            updateCartUI();
        }

        window.modifyQty = (name, delta) => {
            const existing = cart.find(i => i.name === name);
            if (existing) {
                existing.quantity += delta;
                if (existing.quantity <= 0) cart = cart.filter(i => i.name !== name);
            } else if (delta > 0) {
                cart.push({ name: name, quantity: 1 });
            }
            updateCartUI();
        };

        function updateCartUI() {
            let totalQty = 0;
            let itemsText = [];
            cart.forEach(item => {
                totalQty += item.quantity;
                itemsText.push(`${item.name} (${item.quantity})`);
                const qtyEl = document.getElementById(`qty-${item.name}`);
                if(qtyEl) qtyEl.innerText = item.quantity;
            });

            document.querySelectorAll('.qty-val').forEach(el => {
                const name = el.id.replace('qty-', '');
                if(!cart.find(i => i.name === name)) el.innerText = "0";
            });

            const countEl = document.getElementById('cart-count');
            if (totalQty > 0) {
                countEl.innerText = totalQty;
                countEl.style.display = 'flex';
                document.getElementById('cart-summary-block').style.display = 'block';
                document.getElementById('cart-items').innerText = itemsText.join(', ');
            } else {
                countEl.style.display = 'none';
                document.getElementById('cart-summary-block').style.display = 'none';
            }
        }

        window.openBooking = () => {
            document.getElementById('booking-app').style.display = 'block';
            document.body.style.overflow = 'hidden';
            loadServices();
        };

        window.closeBooking = () => {
            document.getElementById('booking-app').style.display = 'none';
            document.body.style.overflow = '';
        };

        window.goToForm = () => {
            if (cart.length === 0) return alert("Выберите услуги!");
            document.getElementById('step-services').style.display = 'none';
            document.getElementById('step-form').style.display = 'block';
            document.getElementById('step-title').innerText = "Данные для записи";
        };

        window.finish = async () => {
            const n = document.getElementById('uName').value;
            const p = document.getElementById('uPhone').value;
            const d = document.getElementById('uDate').value; 
            const t = document.getElementById('uTime').value;

            if (!n || !p || !d) return alert("Заполните имя, телефон и дату!");

            const dateParts = d.split('-'); 
            const docId = `${dateParts[0]}_${parseInt(dateParts[1])}_${parseInt(dateParts[2])}_${t}`;

            try {
                await setDoc(doc(db, "appointments", docId), {
                    name: n,
                    phone: p,
                    date: `${parseInt(dateParts[2])}.${parseInt(dateParts[1])}.${dateParts[0]}`,
                    services: cart,
                    comment: document.getElementById('uComment').value,
                    hour: parseInt(t),
                    timestamp: new Date()
                });
                alert("Успешно! Мы вас ждем.");
                location.reload();
            } catch (e) { alert("Ошибка: " + e.message); }
        };
    </script>
</body>
</html>
