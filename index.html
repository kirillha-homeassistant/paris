<!DOCTYPE html>
<html lang="ru">
<head>
    <title>ПАРИЖ | Салон красоты ТРЦ Арена</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #1a1a1a; --light: #ffffff; --grey: #f8f8f8; --border: #e0e0e0; }
        * { box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; margin: 0; background: var(--light); color: var(--dark); line-height: 1.6; }
        
        /* ШАПКА */
        header { 
            position: fixed; top: 0; width: 100%; z-index: 1000; 
            padding: 10px 5%; display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
        }
        .header-brand { display: flex; align-items: center; gap: 10px; }
        .header-logo-img { height: 40px; border-radius: 5px; }

        /* ГЛАВНЫЙ ЭКРАН С ТВОЕЙ ВЫВЕСКОЙ */
        .hero { 
            height: 85vh; 
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), 
            url('https://api20.iloveimg.com/v1/download/dnl6b2x2jq4ls613xz0szn24shjndczp87A5y7fmx97h5sdk9c49llnljksd9v6xtAq2s2k4gk9crrgs7tvhg3sdnmkw9Apfg9f27f5k6Ap1kzbAAcn5smxh2qz6c3hk3mbph3cAA6flkctm467A1xc6sbd7ncsgf8sv8kvn6qhnmtqbg6w1') center/cover; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; text-align: center;
            margin-top: 60px;
        }
        .hero-box { background: rgba(0, 0, 0, 0.4); padding: 40px; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2); }
        .hero h1 { font-size: clamp(30px, 6vw, 60px); font-weight: 900; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        
        .btn-main { 
            margin-top: 30px; padding: 20px 45px; background: #fff; color: #000; 
            font-weight: 800; border: none; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 2px;
        }
        .btn-main:hover { transform: scale(1.02); background: var(--gold); color: #fff; }
        .btn-main:disabled { background: #ccc !important; color: #666 !important; cursor: not-allowed; }

        /* СЕКЦИЯ КАРТЫ */
        .map-section { background: var(--grey); padding: 80px 10%; text-align: center; }
        .map-container { width: 100%; height: 400px; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-top: 30px; }

        /* ОКНО ЗАПИСИ (APP) */
        #booking-app { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 2000; overflow-y: auto; padding: 80px 5% 40px 5%; }
        .s-card { display: flex; justify-content: space-between; align-items: center; padding: 20px; margin-bottom: 12px; background: var(--grey); border-radius: 8px; }
        .qty-btn { width: 35px; height: 35px; border: 1px solid var(--dark); background: #fff; cursor: pointer; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        
        #cart-bar { position: fixed; bottom: 0; width: 100%; background: #000; color: #fff; padding: 20px 10%; display: none; justify-content: space-between; align-items: center; z-index: 2001; }
        .y-input { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #ddd; font-family: inherit; font-size: 16px; border-radius: 5px; outline: none; }
    </style>
</head>
<body>

    <header>
        <div class="header-brand">
            <img src="https://api20.iloveimg.com/v1/download/dnl6b2x2jq4ls613xz0szn24shjndczp87A5y7fmx97h5sdk9c49llnljksd9v6xtAq2s2k4gk9crrgs7tvhg3sdnmkw9Apfg9f27f5k6Ap1kzbAAcn5smxh2qz6c3hk3mbph3cAA6flkctm467A1xc6sbd7ncsgf8sv8kvn6qhnmtqbg6w1" class="header-logo-img">
            <div style="font-weight:900;">ПАРИЖ</div>
        </div>
        <div style="font-size: 11px; font-weight: 700; text-align: right;">ТРЦ АРЕНА<br>1 ЭТАЖ</div>
    </header>

    <div class="hero">
        <div class="hero-box">
            <h1>Здесь стригут клёво</h1>
            <p style="letter-spacing: 3px; font-weight: 300;">САЛОН КРАСОТЫ</p>
            <button class="btn-main" onclick="openBooking()">Записаться онлайн</button>
        </div>
    </div>

    <section class="map-section">
        <div style="font-size: 28px; font-weight: 700; text-transform: uppercase;">Как нас найти</div>
        <p style="color: #666; margin-top: 10px;">Барнаул, Павловский тракт, 188. <b>ТРЦ Арена, 1 этаж.</b></p>
        <div class="map-container">
            <script type="text/javascript" charset="utf-8" async src="https://api-maps.yandex.ru/services/constructor/1.0/js/?um=constructor%3A2a795ee99572c857cbb2ed1e8182ff7783dda036340148f4dfbf42c5e1518596&amp;width=100%25&amp;height=400&amp;lang=ru_RU&amp;scroll=true"></script>
        </div>
    </section>

    <div id="booking-app">
        <button onclick="location.reload()" style="position:fixed; top:20px; left:20px; font-size:30px; border:none; background:none; cursor:pointer; z-index:2001;">✕</button>
        <h2 id="step-title" style="text-align:center; text-transform:uppercase; margin-bottom: 30px;">Выбор услуг</h2>
        
        <div id="step-services">
            <div id="services-container"></div>
        </div>

        <div id="step-form" style="display:none; max-width: 500px; margin: 0 auto;">
            <label>Дата визита</label>
            <input type="date" id="uDate" class="y-input" onchange="checkAvailability()">
            <label>Время</label>
            <select id="uTime" class="y-input" onchange="checkAvailability()">
                <option value="9">09:00</option><option value="10">10:00</option><option value="11">11:00</option><option value="12">12:00</option>
                <option value="13">13:00</option><option value="14">14:00</option><option value="15">15:00</option><option value="16">16:00</option>
                <option value="17">17:00</option><option value="18">18:00</option><option value="19">19:00</option><option value="20">20:00</option>
            </select>
            <input type="text" id="uName" placeholder="Ваше имя" class="y-input">
            <input type="tel" id="uPhone" placeholder="Телефон" class="y-input">
            <textarea id="uComment" placeholder="Комментарий" class="y-input" style="height:80px;"></textarea>
            <button id="finalBtn" class="btn-main" style="width:100%; background:#000; color:#fff;" onclick="finish()">Записаться</button>
        </div>
    </div>

    <div id="cart-bar">
        <div><b id="cart-count">0</b> услуг выбрано</div>
        <button style="background:var(--gold); color:#fff; border:none; padding:15px 30px; font-weight:700; cursor:pointer; border-radius: 5px;" onclick="goToForm()">Продолжить</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDE-ZzO_39S-TshO8u36M7_W_E9qM",
        projectId: "parisarenaonline",
        appId: "1:84149021703:web:a2b75e7a9b6c4d5e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let cart = [];

    // ... (тут функции openBooking, modifyQty и updateUI остаются без изменений) ...

    window.goToForm = () => {
        document.getElementById('step-services').style.display='none';
        document.getElementById('step-form').style.display='block';
        document.getElementById('step-title').innerText = "Контактные данные";
        document.getElementById('cart-bar').style.display = 'none';
    };

    // ВОТ ЭТОТ БЛОК НУЖНО ВСТАВИТЬ/ЗАМЕНИТЬ:
    window.checkAvailability = async () => {
        const dateVal = document.getElementById('uDate').value; 
        const timeVal = document.getElementById('uTime').value; 
        const btn = document.getElementById('finalBtn');

        if (!dateVal) return;

        const parts = dateVal.split('-'); 
        const year = parts[0];
        const month = parseInt(parts[1]); 
        const day = parseInt(parts[2]);   
        
        // Формируем ID точно как во Flutter: 2026_3_15_9
        const docId = `${year}_${month}_${day}_${timeVal}`;
        
        btn.innerText = "Проверка...";
        btn.disabled = true;

        try {
            const docSnap = await getDoc(doc(db, "appointments", docId));

            if (docSnap.exists()) {
                btn.innerText = "ЗАНЯТО НА ЭТО ВРЕМЯ";
                btn.style.backgroundColor = "#ff4444";
                btn.disabled = true;
            } else {
                btn.innerText = "ЗАПИСАТЬСЯ";
                btn.style.backgroundColor = "#000";
                btn.disabled = false;
            }
        } catch (e) {
            console.error(e);
            btn.innerText = "ОШИБКА СЕТИ";
            btn.disabled = false;
        }
    };

    window.finish = async () => {
        const dInput = document.getElementById('uDate').value;
        const name = document.getElementById('uName').value;
        const phone = document.getElementById('uPhone').value;

        if(!dInput || !name || !phone) return alert("Заполните все поля!");

        const parts = dInput.split('-');
        const t = document.getElementById('uTime').value;
        const docId = `${parts[0]}_${parseInt(parts[1])}_${parseInt(parts[2])}_${t}`;
        
        const finalCheck = await getDoc(doc(db, "appointments", docId));
        if (finalCheck.exists()) {
            alert("Это время уже заняли!");
            return checkAvailability();
        }

        await setDoc(doc(db, "appointments", docId), {
            name: name,
            phone: phone,
            services: cart,
            comment: document.getElementById('uComment').value,
            date: `${parseInt(parts[2])}.${parseInt(parts[1])}.${parts[0]}`,
            hour: parseInt(t),
            timestamp: new Date()
        });
        alert("Вы успешно записаны!");
        location.reload();
    };
</script>
</body>
</html>
