<div id="booking-app">
    <div class="header">
        <button class="back-btn" onclick="closeBooking()">←</button>
        <b id="header-title">Выбор услуг</b>
    </div>
    
    <div id="step-services">
        <div id="services-container">
            <p style="text-align:center; padding:20px;">Загрузка услуг...</p>
        </div>
        
        <div id="cart-summary" style="padding: 15px; border-top: 2px solid var(--y-orange); background: #fff; position: sticky; bottom: 0;">
            <div style="font-size: 14px; font-weight: bold; color: #555;">ВЫБРАНО:</div>
            <div id="cart-items" style="font-size: 13px; margin: 5px 0; color: #000;">Ничего не выбрано</div>
            <button class="btn-confirm" onclick="goToForm()">ПЕРЕЙТИ К ОФОРМЛЕНИЮ</button>
        </div>
    </div>

    <div id="step-form" style="display:none;" class="form-box">
        <span class="label-text">Дата и время визита</span>
        <div style="display: flex; gap: 10px;">
            <input type="date" id="uDate" class="y-input" style="flex: 2;">
            <select id="uTime" class="y-input" style="flex: 1;">
                <option value="9">09:00</option><option value="10">10:00</option>
                <option value="11">11:00</option><option value="12">12:00</option>
                <option value="13">13:00</option><option value="14">14:00</option>
                <option value="15">15:00</option><option value="16">16:00</option>
                <option value="17">17:00</option><option value="18">18:00</option>
                <option value="19">19:00</option><option value="20">20:00</option>
            </select>
        </div>
        
        <span class="label-text">Ваше имя</span>
        <input type="text" id="uName" class="y-input" placeholder="Введите имя">
        
        <span class="label-text">Телефон</span>
        <input type="tel" id="uPhone" class="y-input" placeholder="+7 (___) ___-__-__">
        
        <span class="label-text">Комментарий</span>
        <textarea id="uComment" class="y-input" style="height: 60px;" placeholder="Ваши пожелания"></textarea>
        
        <button class="btn-confirm" id="finalBtn" onclick="finish()">ПОДТВЕРДИТЬ ЗАПИСЬ</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDE-ZzO_39S-TshO8u36M7_W_E9qM",
        appId: "1:84149021703:web:a2b75e7a9b6c4d5e",
        messagingSenderId: "84149021703",
        projectId: "parisarenaonline",
        storageBucket: "parisarenaonline.appspot.com",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let selectedServices = [];

    async function loadServices() {
        const container = document.getElementById('services-container');
        const snap = await getDocs(collection(db, "services"));
        container.innerHTML = "";
        snap.forEach(doc => {
            const s = doc.data();
            const card = document.createElement('div');
            card.className = 's-card';
            card.innerHTML = `<span class="s-name">${s.name}</span><span class="s-price">${s.price}</span>`;
            card.onclick = () => {
                if (selectedServices.includes(s.name)) {
                    selectedServices = selectedServices.filter(i => i !== s.name);
                    card.classList.remove('selected');
                } else {
                    selectedServices.push(s.name);
                    card.classList.add('selected');
                }
                updateCart();
            };
            container.appendChild(card);
        });
    }

    function updateCart() {
        const cartItems = document.getElementById('cart-items');
        cartItems.innerText = selectedServices.length > 0 ? selectedServices.join(', ') : "Ничего не выбрано";
    }

    window.openBooking = () => {
        document.getElementById('booking-app').style.display = 'block';
        document.body.style.overflow = 'hidden';
        loadServices();
    };

    window.closeBooking = () => {
        document.getElementById('booking-app').style.display = 'none';
        document.body.style.overflow = '';
    };

    window.goToForm = () => {
        if (selectedServices.length === 0) return alert("Выберите услуги!");
        document.getElementById('step-services').style.display = 'none';
        document.getElementById('step-form').style.display = 'block';
    };

    window.finish = async () => {
        const n = document.getElementById('uName').value;
        const p = document.getElementById('uPhone').value;
        const d = document.getElementById('uDate').value; // Формат ГГГГ-ММ-ДД
        const t = document.getElementById('uTime').value; // Час (напр. "14")
        const c = document.getElementById('uComment').value;

        if (!n || !p || !d) return alert("Заполните все данные!");

        // Формируем ID для календаря админки (ГГГГ_М_Д_Ч)
        const dateParts = d.split('-'); 
        const docId = `${dateParts[0]}_${parseInt(dateParts[1])}_${parseInt(dateParts[2])}_${t}`;

        try {
            // Сохраняем в appointments (в ту же структуру, что и приложение)
            await setDoc(doc(db, "appointments", docId), {
                name: n,
                phone: p,
                date: `${parseInt(dateParts[2])}.${parseInt(dateParts[1])}.${dateParts[0]}`,
                services: selectedServices,
                comment: c,
                hour: parseInt(t),
                timestamp: new Date()
            });
            alert("Запись оформлена!");
            location.reload();
        } catch (e) { alert("Ошибка: " + e.message); }
    };
</script>
