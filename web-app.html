<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARIS Admin</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; margin: 0; padding: 20px; }
        .header { background: linear-gradient(45deg, #0088cc, #005588); padding: 30px 20px; border-radius: 20px; text-align: center; margin-bottom: 25px; }
        .rev-label { font-size: 0.8em; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; }
        .rev-val { font-size: 2.5em; font-weight: bold; margin-top: 5px; }
        .card { background: #1c1c1e; border-radius: 15px; padding: 15px; margin-bottom: 12px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .card-info b { display: block; font-size: 1.1em; color: #0088cc; }
        .card-info span { font-size: 0.9em; color: #888; }
        .loader { text-align: center; padding: 50px; color: #555; }
    </style>
</head>
<body>
    <div class="header">
        <div class="rev-label">Выручка (Архив)</div>
        <div id="revenue" class="rev-val">... ₽</div>
    </div>

    <h3 id="title">Записи</h3>
    <div id="list" class="loader">Загрузка данных...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.backgroundColor = '#000000';

        // ВСТАВЬ СЮДА ССЫЛКУ /exec ИЗ GOOGLE SCRIPTS
        const API = "https://script.google.com/macros/s/.../exec";

        async function load() {
            try {
                const res = await fetch(API + "?action=getData");
                const data = await res.json();
                
                document.getElementById('revenue').innerText = (data.stats.total || 0) + " ₽";
                const list = document.getElementById('list');
                list.innerHTML = "";
                list.className = "";

                const apps = data.appointments;
                if (!apps || Object.keys(apps).length === 0) {
                    list.innerHTML = "<div style='text-align:center;color:#444'>Записей нет</div>";
                    return;
                }

                for (let id in apps) {
                    list.innerHTML += `
                        <div class="card">
                            <div class="card-info">
                                <b>${apps[id].hour}:00 — ${apps[id].name}</b>
                                <span>${apps[id].date} | ${apps[id].phone}</span>
                            </div>
                        </div>`;
                }
            } catch (e) {
                document.getElementById('list').innerText = "Ошибка доступа к API";
            }
        }
        load();
    </script>
</body>
</html>
