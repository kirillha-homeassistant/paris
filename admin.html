<!DOCTYPE html>
<html lang="ru">
<head>
    <title>PARIS | Admin Panel</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #000; --red: #e74c3c; --bg: #f4f6f9; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        #login-screen { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; justify-content: center; align-items: center; color: white; }
        .login-box { text-align: center; width: 300px; }
        .y-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        
        header { background: var(--dark); color: #fff; padding: 20px; text-align: center; font-weight: 900; letter-spacing: 2px; position: sticky; top: 0; z-index: 100; }
        
        .tabs { display: flex; background: white; border-bottom: 1px solid #ddd; position: sticky; top: 60px; z-index: 100; }
        .tab { flex: 1; padding: 15px; text-align: center; font-size: 10px; font-weight: 900; cursor: pointer; color: #999; text-transform: uppercase; }
        .tab.active { color: var(--gold); border-bottom: 3px solid var(--gold); }

        .content { flex: 1; overflow-y: auto; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .card-title { font-weight: 900; font-size: 16px; display: flex; justify-content: space-between; align-items: center; }
        .card-info { font-size: 12px; color: #666; margin: 8px 0; line-height: 1.4; }
        
        .btn { padding: 12px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; font-size: 11px; text-transform: uppercase; margin-top: 5px; transition: 0.2s; }
        .btn-gold { background: var(--gold); color: white; width: 100%; }
        .btn-black { background: var(--dark); color: white; width: 100%; }
        .btn-red { background: var(--red); color: white; flex: 1; }
        .btn-outline { background: none; border: 1.5px solid #ddd; color: #666; flex: 1; }

        .btn-row { display: flex; gap: 8px; margin-top: 10px; }
        .stats-box { background: var(--dark); color: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; text-align: center; }
        
        #edit-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:10000; justify-content:center; align-items:center; }
        .modal-body { background:white; padding:25px; border-radius:20px; width:90%; max-width:400px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>PARIS ADMIN</h2>
            <input type="password" id="passInput" class="y-input" placeholder="Пароль" style="background:#222; color:white; border:none;">
            <button class="btn btn-gold" onclick="checkLogin()">ВОЙТИ</button>
        </div>
    </div>

    <header>PARIS CONTROL</header>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('apps', this)">Записи</div>
        <div class="tab" onclick="switchTab('services', this)">Услуги</div>
        <div class="tab" onclick="switchTab('stats', this)">Отчет</div>
    </div>

    <div class="content">
        <div id="section-apps">
            <div id="apps-list">Загрузка данных...</div>
        </div>

        <div id="section-services" style="display:none">
            <div class="card">
                <input type="text" id="newServiceName" class="y-input" placeholder="Название новой услуги">
                <button class="btn btn-gold" onclick="addService()">Добавить в прайс</button>
            </div>
            <div id="services-list"></div>
        </div>

        <div id="section-stats" style="display:none">
            <div class="stats-box">
                <div style="font-size: 11px; opacity: 0.6; margin-bottom: 5px;">ОБЩАЯ ВЫРУЧКА</div>
                <div id="total-rev" style="font-size: 32px; font-weight: 900; color: var(--gold);">0 ₽</div>
            </div>
            <div id="archive-list"></div>
        </div>
    </div>

    <div id="edit-modal">
        <div class="modal-body">
            <h3 style="margin-top:0">Редактировать</h3>
            <input type="hidden" id="editId">
            <input type="text" id="editName" class="y-input" placeholder="Имя">
            <input type="date" id="editDate" class="y-input">
            <input type="number" id="editHour" class="y-input" placeholder="Час (например 14)">
            <button class="btn btn-gold" onclick="saveEdit()">Сохранить изменения</button>
            <button class="btn btn-outline" style="width:100%" onclick="document.getElementById('edit-modal').style.display='none'">Отмена</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, setDoc, query, orderBy, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDE-ZzO_39S-TshO8u36M7_W_E9qM",
            projectId: "parisarenaonline",
            appId: "1:84149021703:web:a2b75e7a9b6c4d5e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const PIPEDREAM_URL = "https://eokh9jezesm1803.m.pipedream.net/";

        window.checkLogin = () => {
            if (document.getElementById('passInput').value === "admin777") {
                document.getElementById('login-screen').style.display = 'none';
                initData();
            } else alert("Доступ закрыт!");
        };

        function initData() {
            // Записи
            onSnapshot(query(collection(db, "appointments"), orderBy("timestamp", "desc")), (snap) => {
                const list = document.getElementById('apps-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    const a = d.data();
                    list.innerHTML += `
                        <div class="card">
                            <div class="card-title">${a.name} <span>${a.hour}:00</span></div>
                            <div class="card-info">
                                📅 ${a.date}<br>
                                📞 ${a.phone}<br>
                                ✂️ ${a.services || 'Не указано'}<br>
                                💬 ${a.comment || 'Нет комментария'}
                            </div>
                            <input type="number" id="sum-${d.id}" class="y-input" placeholder="Сумма оплаты ₽">
                            <button class="btn btn-black" onclick="finishBooking('${d.id}')">Завершить и выдать чек</button>
                            <div class="btn-row">
                                <button class="btn btn-outline" onclick="openEdit('${d.id}', '${a.name}', '${a.date}', ${a.hour})">Изменить</button>
                                <button class="btn btn-red" onclick="deleteBooking('${d.id}')">Удалить</button>
                            </div>
                            <button class="btn btn-red" style="width:100%; opacity:0.6;" onclick="banUser('${a.clientId}', '${a.name}')">В БАН</button>
                        </div>`;
                });
            });

            // Услуги
            onSnapshot(collection(db, "services"), (snap) => {
                const list = document.getElementById('services-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    list.innerHTML += `<div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                        <b>${d.data().name}</b>
                        <button class="btn btn-red" style="padding:5px 10px" onclick="deleteService('${d.id}')">✕</button>
                    </div>`;
                });
            });

            // Выручка
            onSnapshot(collection(db, "archive"), (snap) => {
                let total = 0;
                const list = document.getElementById('archive-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    const a = d.data();
                    total += Number(a.finalPrice || 0);
                    list.innerHTML += `<div class="card" style="opacity:0.7; font-size:11px;">${a.date} | ${a.name} | <b>${a.finalPrice} ₽</b></div>`;
                });
                document.getElementById('total-rev').innerText = total + " ₽";
            });
        }

        // --- ЛОГИКА ДЕЙСТВИЙ ---

        window.finishBooking = async (id) => {
            const sum = document.getElementById(`sum-${id}`).value;
            if(!sum) return alert("Введите итоговую сумму!");
            const docRef = doc(db, "appointments", id);
            const snap = await getDoc(docRef);
            const data = snap.data();

            // В архив и удаляем
            await setDoc(doc(db, "archive", id), { ...data, finalPrice: sum, status: "completed" });
            await deleteDoc(docRef);

            // Шлем чек через Pipedream
            await fetch(PIPEDREAM_URL, {
                method: "POST",
                body: JSON.stringify({ action: "complete_order", customerChatId: data.clientId, price: sum })
            });
            alert("Готово! Чек отправлен клиенту.");
        };

        window.addService = async () => {
            const name = document.getElementById('newServiceName').value;
            if(!name) return;
            await setDoc(doc(db, "services", "s_" + Date.now()), { name });
            document.getElementById('newServiceName').value = "";
        };

        window.deleteService = async (id) => { if(confirm("Удалить услугу из прайса?")) await deleteDoc(doc(db, "services", id)); };

        window.deleteBooking = async (id) => { if(confirm("Отменить запись клиента?")) await deleteDoc(doc(db, "appointments", id)); };

        window.banUser = async (clientId, name) => {
            if(confirm(`ЗАБАНИТЬ клиента ${name}? Он больше не сможет пользоваться ботом.`)) {
                await setDoc(doc(db, "blacklist", clientId), { name, date: new Date().toLocaleDateString() });
                alert("Клиент заблокирован.");
            }
        };

        window.openEdit = (id, name, date, hour) => {
            document.getElementById('editId').value = id;
            document.getElementById('editName').value = name;
            document.getElementById('editDate').value = date;
            document.getElementById('editHour').value = hour;
            document.getElementById('edit-modal').style.display = 'flex';
        };

        window.saveEdit = async () => {
            const id = document.getElementById('editId').value;
            await updateDoc(doc(db, "appointments", id), {
                name: document.getElementById('editName').value,
                date: document.getElementById('editDate').value,
                hour: Number(document.getElementById('editHour').value)
            });
            document.getElementById('edit-modal').style.display = 'none';
        };

        window.switchTab = (target, el) => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            ['apps', 'services', 'stats'].forEach(s => document.getElementById('section-' + s).style.display = s === target ? 'block' : 'none');
        };
    </script>
</body>
</html>
