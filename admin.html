<!DOCTYPE html>
<html lang="ru">
<head>
    <title>PARIS | Control Center</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #000; --card: #ffffff; --bg: #f0f2f5; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Авторизация */
        #login-screen { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; justify-content: center; align-items: center; color: white; }
        .login-box { text-align: center; width: 300px; }
        .y-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: white; box-sizing: border-box; }
        
        header { background: var(--dark); color: #fff; padding: 20px; text-align: center; font-weight: 900; letter-spacing: 2px; }
        
        .tabs { display: flex; background: white; border-bottom: 1px solid #ddd; }
        .tab { flex: 1; padding: 15px; text-align: center; font-size: 10px; font-weight: 900; cursor: pointer; color: #999; }
        .tab.active { color: var(--gold); border-bottom: 3px solid var(--gold); }

        .content { flex: 1; overflow-y: auto; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card-title { font-weight: 900; font-size: 14px; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .card-sub { font-size: 11px; color: #888; margin-bottom: 10px; }
        
        .btn { padding: 10px 15px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; font-size: 11px; text-transform: uppercase; }
        .btn-gold { background: var(--gold); color: white; }
        .btn-black { background: var(--dark); color: white; width: 100%; margin-top: 10px; }
        .btn-approve { background: #2ecc71; color: white; }

        .stats { background: var(--dark); color: white; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .rev-val { font-size: 24px; font-weight: 900; color: var(--gold); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="letter-spacing: 3px;">PARIS ADMIN</h2>
            <input type="password" id="passInput" class="y-input" placeholder="Пароль">
            <button class="btn btn-gold" style="width:100%" onclick="checkLogin()">ВОЙТИ</button>
        </div>
    </div>

    <header>ПАРИЖ УПРАВЛЕНИЕ</header>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('apps', this)">ЗАПИСИ</div>
        <div id="rev-badge" class="tab" onclick="switchTab('revs', this)">ОТЗЫВЫ</div>
        <div class="tab" onclick="switchTab('stats', this)">ОТЧЕТ</div>
    </div>

    <div class="content">
        <div id="section-apps">
            <div id="apps-list">Загрузка записей...</div>
        </div>

        <div id="section-revs" style="display:none">
            <div id="revs-list">Нет новых отзывов</div>
        </div>

        <div id="section-stats" style="display:none">
            <div class="stats">
                <div style="font-size: 10px; opacity: 0.7;">ВЫРУЧКА ВСЕГО</div>
                <div id="total-rev" class="rev-val">0 ₽</div>
            </div>
            <div id="archive-list"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, setDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDE-ZzO_39S-TshO8u36M7_W_E9qM",
            projectId: "parisarenaonline",
            appId: "1:84149021703:web:a2b75e7a9b6c4d5e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- ВХОД ---
        window.checkLogin = () => {
            const pass = document.getElementById('passInput').value;
            if (pass === "admin777") { // ТВОЙ ПАРОЛЬ
                document.getElementById('login-screen').style.display = 'none';
                initData();
            } else {
                alert("Неверный пароль");
            }
        };

        function initData() {
            // Подписка на записи
            onSnapshot(query(collection(db, "appointments"), orderBy("timestamp", "desc")), (snap) => {
                const list = document.getElementById('apps-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    const a = d.data();
                    list.innerHTML += `
                        <div class="card">
                            <div class="card-title">${a.name} <span>${a.hour}:00</span></div>
                            <div class="card-sub">${a.date} | ${a.master}</div>
                            <input type="number" id="sum-${d.id}" class="y-input" placeholder="Введите сумму оплаты" style="background:#f9f9f9; color:black; border:1px solid #ddd;">
                            <button class="btn btn-black" onclick="finishBooking('${d.id}')">Завершить и оплатить</button>
                        </div>
                    `;
                });
            });

            // Подписка на отзывы
            onSnapshot(collection(db, "reviews"), (snap) => {
                const list = document.getElementById('revs-list');
                let pendingCount = 0;
                list.innerHTML = "";
                snap.forEach(d => {
                    const r = d.data();
                    if(r.status === 'pending') pendingCount++;
                    list.innerHTML += `
                        <div class="card">
                            <div class="card-title">${r.user} <span style="font-size:9px">${r.date}</span></div>
                            <p style="font-size:12px">${r.text}</p>
                            ${r.status === 'pending' ? 
                                `<button class="btn btn-approve" onclick="approveReview('${d.id}')">ОПУБЛИКОВАТЬ НА САЙТ</button>` : 
                                `<span style="color:green; font-size:10px; font-weight:900;">✅ ОПУБЛИКОВАНО</span>`}
                            <button class="btn" style="color:red" onclick="deleteReview('${d.id}')">Удалить</button>
                        </div>
                    `;
                });
                document.getElementById('rev-badge').innerText = `ОТЗЫВЫ (${pendingCount})`;
            });
        }

        // --- ФУНКЦИИ УПРАВЛЕНИЯ ---
        window.finishBooking = async (id) => {
            const sum = document.getElementById(`sum-${id}`).value;
            if(!sum) return alert("Введите сумму!");
            
            // Логика архивации (переносим в архив и удаляем из текущих)
            // Здесь можно добавить вызов функции бота для уведомления клиента
            alert("Запись оплачена: " + sum + "₽");
            // Реализация переноса аналогична прошлому коду
        };

        window.approveReview = async (id) => {
            await updateDoc(doc(db, "reviews", id), { status: "published" });
        };

        window.deleteReview = async (id) => {
            if(confirm("Удалить отзыв?")) await deleteDoc(doc(db, "reviews", id));
        };

        window.switchTab = (target, el) => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            ['apps', 'revs', 'stats'].forEach(s => document.getElementById('section-' + s).style.display = s === target ? 'block' : 'none');
        };
    </script>
</body>
</html>
