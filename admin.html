<!DOCTYPE html>
<html lang="ru">
<head>
    <title>PARIS | Admin Realtime</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #000; --red: #e74c3c; --bg: #f4f6f9; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); margin: 0; }
        #login-screen { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; justify-content: center; align-items: center; color: white; }
        .login-box { text-align: center; width: 300px; }
        .y-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        header { background: var(--dark); color: #fff; padding: 20px; text-align: center; font-weight: 900; letter-spacing: 2px; }
        .tabs { display: flex; background: white; border-bottom: 1px solid #ddd; sticky: top; }
        .tab { flex: 1; padding: 15px; text-align: center; font-size: 10px; font-weight: 900; cursor: pointer; color: #999; }
        .tab.active { color: var(--gold); border-bottom: 3px solid var(--gold); }
        .content { padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .btn { padding: 12px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; width: 100%; margin-top: 5px; }
        .btn-gold { background: var(--gold); color: white; }
        .btn-red { background: var(--red); color: white; }
        .btn-outline { background: none; border: 1.5px solid #ddd; color: #666; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>PARIS ADMIN</h2>
            <input type="password" id="passInput" class="y-input" placeholder="Пароль">
            <button class="btn btn-gold" onclick="checkLogin()">ВОЙТИ</button>
        </div>
    </div>

    <header>PARIS CONTROL</header>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('apps', this)">Записи</div>
        <div class="tab" onclick="switchTab('services', this)">Услуги</div>
        <div class="tab" onclick="switchTab('black', this)">ЧС</div>
    </div>

    <div class="content">
        <div id="section-apps">
            <div id="apps-list">Загрузка данных из Realtime DB...</div>
        </div>
        <div id="section-services" style="display:none">
            <div class="card">
                <input type="text" id="newService" class="y-input" placeholder="Название услуги">
                <button class="btn btn-gold" onclick="addService()">Добавить</button>
            </div>
            <div id="services-list"></div>
        </div>
        <div id="section-black" style="display:none">
            <div id="black-list"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, remove, push, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // ТВОИ НАСТРОЙКИ (проверь projectId и URL базы)
        const firebaseConfig = {
            databaseURL: "https://parisarenaonline-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "parisarenaonline"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ВХОД
        window.checkLogin = () => {
            const pass = document.getElementById('passInput').value;
            if (pass === "admin777") { // Твой пароль
                document.getElementById('login-screen').style.display = 'none';
                loadData();
            } else {
                alert("Неверный пароль!");
            }
        };

        function loadData() {
            // Слушаем записи
            onValue(ref(db, 'appointments'), (snapshot) => {
                const list = document.getElementById('apps-list');
                list.innerHTML = "";
                const data = snapshot.val();
                if (!data) { list.innerHTML = "Записей нет."; return; }

                for (let id in data) {
                    const a = data[id];
                    list.innerHTML += `
                        <div class="card">
                            <b>${a.name || 'Клиент'}</b> — ${a.hour}:00
                            <div style="font-size:12px; color:666">
                                📅 ${a.date}<br>📞 ${a.phone}<br>✂️ ${a.services || '-'}
                            </div>
                            <button class="btn btn-red" onclick="deleteApp('${id}')">Удалить запись</button>
                            <button class="btn btn-outline" onclick="banUser('${a.clientId}', '${a.name}')">В БАН</button>
                        </div>`;
                }
            });

            // Слушаем услуги
            onValue(ref(db, 'services'), (snapshot) => {
                const list = document.getElementById('services-list');
                list.innerHTML = "";
                const data = snapshot.val();
                for (let id in data) {
                    list.innerHTML += `<div class="card" style="display:flex;justify-content:space-between">
                        ${data[id].name} 
                        <span style="color:red;cursor:pointer" onclick="removeService('${id}')">✕</span>
                    </div>`;
                }
            });

            // Слушаем ЧС
            onValue(ref(db, 'blacklist'), (snapshot) => {
                const list = document.getElementById('black-list');
                list.innerHTML = "";
                const data = snapshot.val();
                for (let id in data) {
                    list.innerHTML += `<div class="card">
                        ${data[id].name} (ID: ${id})
                        <button class="btn btn-outline" onclick="unbanUser('${id}')">Разбанить</button>
                    </div>`;
                }
            });
        }

        // ФУНКЦИИ
        window.deleteApp = (id) => { if(confirm("Удалить?")) remove(ref(db, 'appointments/' + id)); };
        
        window.addService = () => {
            const name = document.getElementById('newService').value;
            if(name) push(ref(db, 'services'), { name });
            document.getElementById('newService').value = "";
        };
        window.removeService = (id) => remove(ref(db, 'services/' + id));

        window.banUser = (uid, name) => {
            if(!uid || uid === "undefined") return alert("ID не найден. Клиент должен привязать запись в боте.");
            set(ref(db, 'blacklist/' + uid), { name, date: new Date().toLocaleDateString() });
        };
        window.unbanUser = (id) => remove(ref(db, 'blacklist/' + id));

        window.switchTab = (tab, el) => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('section-apps').style.display = tab === 'apps' ? 'block' : 'none';
            document.getElementById('section-services').style.display = tab === 'services' ? 'block' : 'none';
            document.getElementById('section-black').style.display = tab === 'black' ? 'block' : 'none';
        };
    </script>
</body>
</html>
