<!DOCTYPE html>
<html lang="ru">
<head>
    <title>PARIS | Control Center</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #000; --card: #ffffff; --bg: #f0f2f5; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        
        #login-screen { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; justify-content: center; align-items: center; color: white; }
        .login-box { text-align: center; width: 300px; }
        .y-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-family: inherit; }
        
        header { background: var(--dark); color: #fff; padding: 20px; text-align: center; font-weight: 900; letter-spacing: 2px; }
        
        .tabs { display: flex; background: white; border-bottom: 1px solid #ddd; sticky; top: 0; z-index: 100; }
        .tab { flex: 1; padding: 15px; text-align: center; font-size: 10px; font-weight: 900; cursor: pointer; color: #999; }
        .tab.active { color: var(--gold); border-bottom: 3px solid var(--gold); }

        .content { flex: 1; overflow-y: auto; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); position: relative; }
        .card-title { font-weight: 900; font-size: 14px; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .card-sub { font-size: 11px; color: #888; margin-bottom: 10px; }
        
        .btn { padding: 10px 15px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; font-size: 11px; text-transform: uppercase; margin: 5px 2px; }
        .btn-gold { background: var(--gold); color: white; width: 100%; }
        .btn-black { background: var(--dark); color: white; width: 100%; }
        .btn-approve { background: #2ecc71; color: white; }
        .btn-edit { background: #3498db; color: white; }
        .btn-del { background: #e74c3c; color: white; }

        .stats { background: var(--dark); color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .rev-val { font-size: 28px; font-weight: 900; color: var(--gold); }
        
        /* Модалка редактирования */
        #edit-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:10000; justify-content:center; align-items:center; }
        .modal-body { background:white; padding:20px; border-radius:15px; width:90%; max-width:400px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="letter-spacing: 3px;">PARIS ADMIN</h2>
            <input type="password" id="passInput" class="y-input" placeholder="Пароль" style="background:#1a1a1a; color:white;">
            <button class="btn btn-gold" onclick="checkLogin()">ВОЙТИ</button>
        </div>
    </div>

    <header>ПАРИЖ УПРАВЛЕНИЕ</header>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('apps', this)">ЗАПИСИ</div>
        <div class="tab" onclick="switchTab('services', this)">УСЛУГИ</div>
        <div id="rev-badge" class="tab" onclick="switchTab('revs', this)">ОТЗЫВЫ</div>
        <div class="tab" onclick="switchTab('stats', this)">ОТЧЕТ</div>
    </div>

    <div class="content">
        <div id="section-apps">
            <div id="apps-list">Загрузка...</div>
        </div>

        <div id="section-services" style="display:none">
            <div class="card">
                <div class="card-title">Добавить услугу</div>
                <input type="text" id="newServiceName" class="y-input" placeholder="Название услуги">
                <button class="btn btn-gold" onclick="addService()">+ Добавить в прайс</button>
            </div>
            <div id="services-list"></div>
        </div>

        <div id="section-revs" style="display:none">
            <div id="revs-list">Нет новых отзывов</div>
        </div>

        <div id="section-stats" style="display:none">
            <div class="stats">
                <div style="font-size: 10px; opacity: 0.7;">ВЫРУЧКА ВСЕГО</div>
                <div id="total-rev" class="rev-val">0 ₽</div>
            </div>
            <div id="archive-list"></div>
        </div>
    </div>

    <div id="edit-modal">
        <div class="modal-body">
            <h3>Изменить запись</h3>
            <input type="hidden" id="editId">
            <label style="font-size:10px">ИМЯ КЛИЕНТА</label>
            <input type="text" id="editName" class="y-input">
            <label style="font-size:10px">ДАТА</label>
            <input type="date" id="editDate" class="y-input">
            <label style="font-size:10px">ВРЕМЯ (ЧАС)</label>
            <input type="number" id="editHour" class="y-input" min="9" max="20">
            <button class="btn btn-gold" onclick="saveEdit()">СОХРАНИТЬ</button>
            <button class="btn btn-black" onclick="document.getElementById('edit-modal').style.display='none'">ОТМЕНА</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, setDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDE-ZzO_39S-TshO8u36M7_W_E9qM",
            projectId: "parisarenaonline",
            appId: "1:84149021703:web:a2b75e7a9b6c4d5e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const PIPEDREAM_URL = "https://eokh9jezesm1803.m.pipedream.net/";

        window.checkLogin = () => {
            if (document.getElementById('passInput').value === "admin777") {
                document.getElementById('login-screen').style.display = 'none';
                initAdmin();
            } else alert("Неверный пароль");
        };

        function initAdmin() {
            // Записи
            onSnapshot(query(collection(db, "appointments"), orderBy("timestamp", "desc")), (snap) => {
                const list = document.getElementById('apps-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    const a = d.data();
                    list.innerHTML += `
                        <div class="card">
                            <div class="card-title">${a.name} <span>${a.hour}:00</span></div>
                            <div class="card-sub">${a.date} | ${a.master}</div>
                            <div style="font-size:11px; margin-bottom:10px; color:var(--gold)">${a.services || 'Без услуг'}</div>
                            <input type="number" id="sum-${d.id}" class="y-input" placeholder="Сумма ₽">
                            <button class="btn btn-black" onclick="finishBooking('${d.id}')">Завершить и оплатить</button>
                            <div style="display:flex; gap:5px">
                                <button class="btn btn-edit" onclick="openEdit('${d.id}', '${a.name}', '${a.date}', ${a.hour})">Изменить</button>
                                <button class="btn btn-del" onclick="deleteBooking('${d.id}')">Удалить</button>
                            </div>
                        </div>`;
                });
            });

            // Услуги
            onSnapshot(collection(db, "services"), (snap) => {
                const list = document.getElementById('services-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    list.innerHTML += `
                        <div class="card" style="display:flex; justify-content:space-between; align-items:center">
                            <b>${d.data().name}</b>
                            <button class="btn btn-del" onclick="deleteService('${d.id}')">✕</button>
                        </div>`;
                });
            });

            // Отзывы
            onSnapshot(collection(db, "reviews"), (snap) => {
                const list = document.getElementById('revs-list');
                let count = 0; list.innerHTML = "";
                snap.forEach(d => {
                    const r = d.data();
                    if(r.status === 'pending') count++;
                    list.innerHTML += `
                        <div class="card">
                            <div class="card-title">${r.user}</div>
                            <p style="font-size:12px">"${r.text}"</p>
                            ${r.status === 'pending' ? `<button class="btn btn-approve" onclick="approveReview('${d.id}')">ОПУБЛИКОВАТЬ</button>` : '✅ На сайте'}
                            <button class="btn btn-del" onclick="deleteReview('${d.id}')">Удалить</button>
                        </div>`;
                });
                document.getElementById('rev-badge').innerText = `ОТЗЫВЫ (${count})`;
            });

            // Архив и выручка
            onSnapshot(collection(db, "archive"), (snap) => {
                const list = document.getElementById('archive-list');
                let total = 0; list.innerHTML = "";
                snap.forEach(d => {
                    const a = d.data(); total += Number(a.finalPrice || 0);
                    list.innerHTML += `<div class="card" style="opacity:0.7; font-size:11px">${a.date} - ${a.name}: <b>${a.finalPrice}₽</b></div>`;
                });
                document.getElementById('total-rev').innerText = total + " ₽";
            });
        }

        // --- ЛОГИКА ---
        window.finishBooking = async (id) => {
            const sum = document.getElementById(`sum-${id}`).value;
            if(!sum) return alert("Введите сумму!");
            
            // 1. Получаем данные записи
            const snap = await getDoc(doc(db, "appointments", id));
            const data = snap.data();

            // 2. Шлем в Pipedream (для уведомления клиента)
            await fetch(PIPEDREAM_URL, {
                method: "POST",
                body: JSON.stringify({ action: "complete_order", customerChatId: data.clientId, price: sum, customerName: data.name })
            });

            // 3. В архив
            await setDoc(doc(db, "archive", id), { ...data, finalPrice: sum, finishedAt: new Date() });
            await deleteDoc(doc(db, "appointments", id));
            alert("Заказ завершен!");
        };

        window.addService = async () => {
            const name = document.getElementById('newServiceName').value;
            if(!name) return;
            await setDoc(doc(db, "services", "ser_" + Date.now()), { name });
            document.getElementById('newServiceName').value = "";
        };

        window.deleteService = async (id) => { if(confirm("Удалить услугу?")) await deleteDoc(doc(db, "services", id)); };

        window.openEdit = (id, name, date, hour) => {
            document.getElementById('editId').value = id;
            document.getElementById('editName').value = name;
            document.getElementById('editDate').value = date;
            document.getElementById('editHour').value = hour;
            document.getElementById('edit-modal').style.display = 'flex';
        };

        window.saveEdit = async () => {
            const id = document.getElementById('editId').value;
            await updateDoc(doc(db, "appointments", id), {
                name: document.getElementById('editName').value,
                date: document.getElementById('editDate').value,
                hour: Number(document.getElementById('editHour').value)
            });
            document.getElementById('edit-modal').style.display = 'none';
        };

        window.approveReview = async (id) => { await updateDoc(doc(db, "reviews", id), { status: "published" }); };
        window.deleteReview = async (id) => { if(confirm("Удалить?")) await deleteDoc(doc(db, "reviews", id)); };
        window.deleteBooking = async (id) => { if(confirm("Удалить запись?")) await deleteDoc(doc(db, "appointments", id)); };

        window.switchTab = (target, el) => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            ['apps', 'services', 'revs', 'stats'].forEach(s => document.getElementById('section-' + s).style.display = s === target ? 'block' : 'none');
        };

        // Вспомогательная функция для получения данных
        async function getDoc(ref) {
            const { getDoc } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
            return await getDoc(ref);
        }
    </script>
</body>
</html>
