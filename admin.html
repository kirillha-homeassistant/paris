<!DOCTYPE html>
<html lang="ru">
<head>
    <title>PARIS | Dual Admin</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #000; --red: #e74c3c; --bg: #f4f6f9; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); margin: 0; }
        #login-screen { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; justify-content: center; align-items: center; color: white; }
        .login-box { text-align: center; width: 300px; }
        header { background: var(--dark); color: #fff; padding: 20px; text-align: center; font-weight: 900; }
        .tabs { display: flex; background: white; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
        .tab { flex: 1; padding: 15px; text-align: center; font-size: 10px; font-weight: 900; cursor: pointer; color: #999; }
        .tab.active { color: var(--gold); border-bottom: 3px solid var(--gold); }
        .content { padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 5px solid transparent; }
        .card-rtdb { border-left-color: #4facfe; } /* Синяя полоска для Realtime */
        .card-fs { border-left-color: #ff9d00; }   /* Оранжевая полоска для Firestore */
        .badge { font-size: 8px; padding: 2px 5px; border-radius: 4px; color: white; float: right; }
        .y-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn { padding: 12px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; width: 100%; margin-top: 5px; }
        .btn-gold { background: var(--gold); color: white; }
        .btn-red { background: var(--red); color: white; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>PARIS CONTROL</h2>
            <input type="password" id="passInput" class="y-input" placeholder="Пароль" style="background:#222; color:white;">
            <button class="btn btn-gold" onclick="checkLogin()">ВОЙТИ</button>
        </div>
    </div>

    <header>PARIS SYSTEM</header>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('apps', this)">Все Записи</div>
        <div class="tab" onclick="switchTab('services', this)">Прайс</div>
    </div>

    <div class="content">
        <div id="section-apps">
            <div id="apps-list">Подключение к базам...</div>
        </div>
        <div id="section-services" style="display:none">
            <input type="text" id="newService" class="y-input" placeholder="Название услуги">
            <button class="btn btn-gold" onclick="addService()">Добавить</button>
            <div id="services-list" style="margin-top:20px"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, remove, set, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getFirestore, collection, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDE-ZzO_39S-TshO8u36M7_W_E9qM",
            projectId: "parisarenaonline",
            databaseURL: "https://parisarenaonline-default-rtdb.europe-west1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const rtdb = getDatabase(app);
        const fs = getFirestore(app);

        window.checkLogin = () => {
            if (document.getElementById('passInput').value === "admin777") {
                document.getElementById('login-screen').style.display = 'none';
                startSync();
            } else alert("Доступ запрещен!");
        };

        function startSync() {
            const list = document.getElementById('apps-list');
            let rtdbApps = {};
            let fsApps = {};

            const renderAll = () => {
                list.innerHTML = "";
                // Рендерим из Realtime
                for (let id in rtdbApps) {
                    const a = rtdbApps[id];
                    list.innerHTML += createCard(id, a, 'RTDB', 'card-rtdb');
                }
                // Рендерим из Firestore
                for (let id in fsApps) {
                    const a = fsApps[id];
                    list.innerHTML += createCard(id, a, 'FIRESTORE', 'card-fs');
                }
            };

            const createCard = (id, a, type, cls) => `
                <div class="card ${cls}">
                    <span class="badge" style="background:${type==='RTDB'?'#4facfe':'#ff9d00'}">${type}</span>
                    <b>${a.name || 'Клиент'}</b> [${a.hour}:00]
                    <div style="font-size:12px; margin:10px 0;">
                        📅 ${a.date} | 📞 ${a.phone}<br>✂️ ${a.services || '-'}
                    </div>
                    <button class="btn btn-red" onclick="deleteAny('${id}', '${type}')">Удалить</button>
                </div>`;

            // Слушаем Realtime
            onValue(ref(rtdb, 'appointments'), (snap) => {
                rtdbApps = snap.val() || {};
                renderAll();
            });

            // Слушаем Firestore
            onSnapshot(collection(fs, "appointments"), (snap) => {
                fsApps = {};
                snap.forEach(d => fsApps[d.id] = d.data());
                renderAll();
            });

            // Слушаем Услуги (из Realtime)
            onValue(ref(rtdb, 'services'), (snap) => {
                const sList = document.getElementById('services-list');
                sList.innerHTML = "";
                const data = snap.val();
                for (let id in data) {
                    sList.innerHTML += `<div class="card">${data[id].name} <span style="float:right;color:red;cursor:pointer" onclick="deleteService('${id}')">✕</span></div>`;
                }
            });
        }

        window.deleteAny = async (id, type) => {
            if(!confirm("Удалить запись?")) return;
            if(type === 'RTDB') await remove(ref(rtdb, 'appointments/' + id));
            else await deleteDoc(doc(fs, "appointments", id));
        };

        window.addService = () => {
            const name = document.getElementById('newService').value;
            if(name) push(ref(rtdb, 'services'), { name });
            document.getElementById('newService').value = "";
        };
        
        window.deleteService = (id) => remove(ref(rtdb, 'services/' + id));

        window.switchTab = (t, el) => {
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('section-apps').style.display = t === 'apps' ? 'block' : 'none';
            document.getElementById('section-services').style.display = t === 'services' ? 'block' : 'none';
        };
    </script>
</body>
</html>
